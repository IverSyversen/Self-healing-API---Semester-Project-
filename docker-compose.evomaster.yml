# =============================================================================
# docker-compose.evomaster.yml
#
# Modified Docker Compose for EvoMaster white-box testing.
#
# Differences from the standard crAPI docker-compose.yml:
#   - The `crapi-identity` service container is stopped by run-whitebox.sh
#     before the EvoMaster driver starts so that port 8080 is free for the
#     instrumented identity-service.jar process.
#   - PostgreSQL is exposed on the host (127.0.0.1:5432) so the standalone
#     identity JAR can reach it directly.  NOTE: do NOT run docker compose
#     with LISTEN_IP=0.0.0.0 on a public droplet as that would expose the
#     database to the internet.
#   - All other services (community, workshop, web, MongoDB, Mailhog) start
#     normally so the identity service has its dependencies available.
#
# Usage:
#   docker compose -f docker-compose.evomaster.yml up -d
#
# The run-whitebox.sh script handles starting and stopping the identity
# container automatically; you do not need to manage it manually.
# =============================================================================

# ---------------------------------------------------------------------------
# Shared network so every service can reach every other service by hostname.
# ---------------------------------------------------------------------------
networks:
  crapi:
    driver: bridge

# ---------------------------------------------------------------------------
# Named volumes for persistent database data.
# ---------------------------------------------------------------------------
volumes:
  mongodb_data:
  postgres_data:

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # MongoDB – used by the community service and identity service.
  # Exposed on the host so the externally-started identity JAR can connect.
  # --------------------------------------------------------------------------
  mongodb:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${LISTEN_IP:-127.0.0.1}:27017:27017"
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # PostgreSQL – used by the identity and workshop services.
  # Exposed on the host so the externally-started identity JAR can connect.
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: crapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: crapisecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${LISTEN_IP:-127.0.0.1}:5432:5432"
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # crAPI Identity Service (Java / Spring Boot)
  #
  # NOTE: This container is stopped by run-whitebox.sh before white-box testing
  #       so that the EvoMaster driver can start an instrumented version of the
  #       identity service JAR directly on the host using port 8080.
  #
  #       During normal (non-EvoMaster) operation this container runs as usual.
  # --------------------------------------------------------------------------
  crapi-identity:
    image: crapi/crapi-identity:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - mongodb
    environment:
      DB_NAME: crapi
      DB_USER: admin
      DB_PASSWORD: crapisecretpassword
      DB_HOST: postgres
      DB_PORT: 5432
      MONGO_DB_HOST: mongodb
      MONGO_DB_PORT: 27017
      MONGO_DB_USER: ""
      MONGO_DB_PASSWORD: ""
      MONGO_DB_NAME: crapi
      SECRET_KEY: crapi-secret-key-evomaster
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: 1025
      MAILHOG_DOMAIN: example.com
      SMTP_EMAIL: user@example.com
      SMTP_PASS: ""
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      COMMUNITY_SERVICE_URL: http://crapi-community:8087
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # crAPI Workshop Service (Python / Flask)
  # --------------------------------------------------------------------------
  crapi-workshop:
    image: crapi/crapi-workshop:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - mongodb
      - crapi-identity
    environment:
      DB_NAME: crapi
      DB_USER: admin
      DB_PASSWORD: crapisecretpassword
      DB_HOST: postgres
      DB_PORT: 5432
      MONGO_DB_HOST: mongodb
      MONGO_DB_PORT: 27017
      MONGO_DB_NAME: crapi
      SECRET_KEY: crapi-secret-key-evomaster
      IDENTITY_SERVICE_URL: http://crapi-identity:8080
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # crAPI Community Service (Go / Gin)
  #
  # This service is written in Go and cannot be instrumented by EvoMaster's
  # Java agent.  It runs normally as part of the Docker stack so dependent
  # services remain available.  run-whitebox.sh does NOT stop this container.
  # --------------------------------------------------------------------------
  crapi-community:
    image: crapi/crapi-community:latest
    restart: unless-stopped
    depends_on:
      - mongodb
      - crapi-identity
    environment:
      MONGO_DB_HOST: mongodb
      MONGO_DB_PORT: 27017
      MONGO_DB_NAME: crapi
      IDENTITY_SERVICE_URL: http://crapi-identity:8080
      SECRET_KEY: crapi-secret-key-evomaster
    ports:
      - "${LISTEN_IP:-127.0.0.1}:8087:8087"
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # crAPI Web (React frontend + Nginx reverse proxy)
  # --------------------------------------------------------------------------
  crapi-web:
    image: crapi/crapi-web:latest
    restart: unless-stopped
    depends_on:
      - crapi-identity
      - crapi-workshop
      - crapi-community
    ports:
      - "${LISTEN_IP:-0.0.0.0}:8888:80"
      - "${LISTEN_IP:-0.0.0.0}:8443:443"
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # Mailhog – catches all outbound e-mails (registration, password reset, etc.)
  # --------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "${LISTEN_IP:-0.0.0.0}:8025:8025"
      - "1025:1025"
    networks:
      - crapi
