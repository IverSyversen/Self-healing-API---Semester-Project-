# =============================================================================
# docker-compose.evomaster.yml
#
# Modified Docker Compose for EvoMaster white-box testing.
#
# Differences from the standard crAPI docker-compose.yml:
#   - The `crapi-identity` service container is stopped by run-whitebox.sh
#     before the EvoMaster driver starts so that port 8080 is free for the
#     instrumented identity-service.jar process.
#   - PostgreSQL is exposed on the host (127.0.0.1:5432) so the standalone
#     identity JAR can reach it directly.  NOTE: do NOT run docker compose
#     with LISTEN_IP=0.0.0.0 on a public droplet as that would expose the
#     database to the internet.
#   - All other services (community, workshop, web, MongoDB, Mailhog) start
#     normally so the identity service has its dependencies available.
#
# Usage:
#   docker compose -f docker-compose.evomaster.yml up -d
#
# The run-whitebox.sh script handles starting and stopping the identity
# container automatically; you do not need to manage it manually.
# =============================================================================

# ---------------------------------------------------------------------------
# Shared network so every service can reach every other service by hostname.
# ---------------------------------------------------------------------------
networks:
  crapi:
    driver: bridge

# ---------------------------------------------------------------------------
# Named volumes for persistent database data.
# ---------------------------------------------------------------------------
volumes:
  mongodb_data:
  postgres_data:

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # MongoDB – used by the community service and identity service.
  # Exposed on the host so the externally-started identity JAR can connect.
  # --------------------------------------------------------------------------
  mongodb:
    image: mongo:6
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: crapisecretpassword
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${LISTEN_IP:-127.0.0.1}:27017:27017"
    networks:
      - crapi
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------------------------
  # PostgreSQL – used by the identity and workshop services.
  # Exposed on the host so the externally-started identity JAR can connect.
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: crapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: crapisecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${LISTEN_IP:-127.0.0.1}:5432:5432"
    networks:
      - crapi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crapi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --------------------------------------------------------------------------
  # crAPI Identity Service (Java / Spring Boot)
  #
  # NOTE: This container is stopped by run-whitebox.sh before white-box testing
  #       so that the EvoMaster driver can start an instrumented version of the
  #       identity service JAR directly on the host using port 8080.
  #
  #       During normal (non-EvoMaster) operation this container runs as usual.
  # --------------------------------------------------------------------------
  crapi-identity:
    image: crapi/crapi-identity:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/identity/api/auth/login -X POST -H 'Content-Type: application/json' -d '{}' | grep -qE '^[2-5]'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    environment:
      LOG_LEVEL: INFO
      DB_NAME: crapi
      DB_USER: admin
      DB_PASSWORD: crapisecretpassword
      DB_HOST: postgres
      DB_PORT: 5432
      SERVER_PORT: 8080
      ENABLE_SHELL_INJECTION: "false"
      JWT_SECRET: crapi
      MONGO_DB_HOST: mongodb
      MONGO_DB_PORT: 27017
      MONGO_DB_USER: admin
      MONGO_DB_PASSWORD: crapisecretpassword
      MONGO_DB_NAME: crapi
      SECRET_KEY: crapi-secret-key-evomaster
      API_GATEWAY_URL: https://api.mypremiumdealership.com
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: 1025
      MAILHOG_DOMAIN: example.com
      SMTP_FROM: no-reply@example.com
      SMTP_EMAIL: user@example.com
      SMTP_PASS: ""
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_AUTH: "false"
      SMTP_STARTTLS: "false"
      JWT_EXPIRATION: "604800000"
      ENABLE_LOG4J: "false"
      TLS_ENABLED: "false"
      TLS_KEYSTORE_TYPE: PKCS12
      TLS_KEYSTORE: classpath:certs/server.p12
      TLS_KEYSTORE_PASSWORD: passw0rd
      TLS_KEY_PASSWORD: passw0rd
      TLS_KEY_ALIAS: identity
      COMMUNITY_SERVICE_URL: http://crapi-community:8087
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # crAPI Workshop Service (Python / Flask)
  # --------------------------------------------------------------------------
  crapi-workshop:
    image: crapi/crapi-workshop:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      crapi-identity:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/workshop/api/shop/products | grep -qE '^[2-5]'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      LOG_LEVEL: INFO
      DB_NAME: crapi
      DB_USER: admin
      DB_PASSWORD: crapisecretpassword
      DB_HOST: postgres
      DB_PORT: 5432
      SERVER_PORT: 8000
      MONGO_DB_HOST: mongodb
      MONGO_DB_PORT: 27017
      MONGO_DB_USER: admin
      MONGO_DB_PASSWORD: crapisecretpassword
      MONGO_DB_NAME: crapi
      SECRET_KEY: crapi-secret-key-evomaster
      API_GATEWAY_URL: https://api.mypremiumdealership.com
      TLS_ENABLED: "false"
      TLS_CERTIFICATE: certs/server.crt
      TLS_KEY: certs/server.key
      IDENTITY_SERVICE: crapi-identity:8080
      IDENTITY_SERVICE_URL: http://crapi-identity:8080
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # crAPI Community Service (Go / Gin)
  #
  # This service is written in Go and cannot be instrumented by EvoMaster's
  # Java agent.  It runs normally as part of the Docker stack so dependent
  # services remain available.  run-whitebox.sh does NOT stop this container.
  # --------------------------------------------------------------------------
  crapi-community:
    image: crapi/crapi-community:latest
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      crapi-identity:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8087/community/api/v2/community/posts/recent | grep -qE '^[2-5]'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      LOG_LEVEL: INFO
      DB_NAME: crapi
      DB_USER: admin
      DB_PASSWORD: crapisecretpassword
      DB_HOST: postgres
      DB_PORT: 5432
      SERVER_PORT: 8087
      MONGO_DB_HOST: mongodb
      MONGO_DB_PORT: 27017
      MONGO_DB_USER: admin
      MONGO_DB_PASSWORD: crapisecretpassword
      MONGO_DB_NAME: crapi
      TLS_ENABLED: "false"
      TLS_CERTIFICATE: certs/server.crt
      TLS_KEY: certs/server.key
      IDENTITY_SERVICE: crapi-identity:8080
      IDENTITY_SERVICE_URL: http://crapi-identity:8080
      SECRET_KEY: crapi-secret-key-evomaster
    ports:
      - "${LISTEN_IP:-127.0.0.1}:8087:8087"
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # crAPI Web (React frontend + Nginx reverse proxy)
  # --------------------------------------------------------------------------
  crapi-web:
    image: crapi/crapi-web:latest
    restart: unless-stopped
    depends_on:
      crapi-identity:
        condition: service_healthy
      crapi-workshop:
        condition: service_healthy
      crapi-community:
        condition: service_healthy
    ports:
      - "${LISTEN_IP:-0.0.0.0}:8888:80"
      - "${LISTEN_IP:-0.0.0.0}:8443:443"
    environment:
      COMMUNITY_SERVICE: crapi-community:8087
      IDENTITY_SERVICE: crapi-identity:8080
      WORKSHOP_SERVICE: crapi-workshop:8000
      CHATBOT_SERVICE: crapi-community:8087
      MAILHOG_WEB_SERVICE: mailhog:8025
      TLS_ENABLED: "false"
    networks:
      - crapi

  # --------------------------------------------------------------------------
  # Mailhog – catches all outbound e-mails (registration, password reset, etc.)
  # --------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "${LISTEN_IP:-0.0.0.0}:8025:8025"
      - "1025:1025"
    networks:
      - crapi
