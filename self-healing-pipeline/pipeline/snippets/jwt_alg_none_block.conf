# Self-healing mitigation: mit-002 — JWT_ALG_NONE / JWT_CONFUSION
# Rejects any Authorization header whose JWT header claims alg=none or
# alg=HS256 (RS256->HS256 confusion attack).
#
# This operates at the nginx layer before the request reaches the app.
# The check decodes the JWT header (base64url, first segment) and blocks
# if the "alg" field is "none" or "HS256".

map $http_authorization $jwt_header_b64 {
    default                  "";
    ~^(?:Bearer|ApiKey)\s+([^.]+)\..* $1;
}

# Block requests where JWT algorithm is "none" or "HS256"
# (nginx lua module required for full decode; this regex catches common encodings)
# base64url of {"alg":"none"...}  starts with "eyJhbGciOiJub25lI"
# base64url of {"alg":"HS256"...} starts with "eyJhbGciOiJIUzI2N"
map $jwt_header_b64 $jwt_alg_blocked {
    default                     0;
    ~*eyJhbGciOiJub25lI            1;
    ~*eyJhbGciOiJIUzI              1;
}

# In your server block, add:
#   if ($jwt_alg_blocked) { return 401 "Invalid JWT algorithm"; }
