# Self-healing mitigation: mit-004 — RATE_LIMIT_MISSING
# Limits coupon validation endpoint to 3 requests per minute per IP.

limit_req_zone $binary_remote_addr zone=coupon_limit:10m rate=3r/m;

# In your location block for /community/api/v2/coupon/validate-coupon:
#   limit_req zone=coupon_limit burst=2 nodelay;
#   limit_req_status 429;
