### EvoMaster configuration for crAPI white-box security testing.
### Full option reference: https://github.com/EMResearch/EvoMaster/blob/master/docs/options.md
###
### This file is loaded by both the CLI and the driver.  CLI flags passed on the
### command line override any value set here, so run-whitebox.sh can still
### override individual settings without changing this file.
###
### SECURITY-FOCUSED SETTINGS
### The defaults below are tuned to maximise BOLA, auth-bypass, schema-violation,
### and mass-assignment detection on the crAPI identity service.

configs:
  ### Output
  outputFilePrefix:    "CrApiCommunityEvoMasterTest"
  outputFileSuffix:    "Test"
  outputFolder:        "./generated_tests"
  outputFormat:        "JAVA_JUNIT_5"

  ### Time budget – 60 min default; override with --time on the CLI.
  maxTime:             "60m"

  ### Only test identity-service endpoints (the instrumented SUT).
  ### Community / workshop are Go/Python and cannot be instrumented.
  endpointPrefix:      "/identity/"

  ### Per-test HTTP timeout (seconds).  crAPI's OTP/email flows are slow.
  testTimeout:         120

  ### Security oracles -------------------------------------------------------
  ### --security true   turns on BOLA/BOPLA, auth-bypass, and forbidden-access
  ###                   detection across the seeded multi-user scenario.
  ### --schemaOracles   flags responses that don't match the OpenAPI spec.

  ### Coverage / exploration helpers -----------------------------------------
  ### taintOnSampling speeds up branch solving (especially for email/OTP flows).
  ### discoveredInfoRewardedInFitness drives exploration towards new JSON fields
  ### — the core signal needed to surface mass-assignment opportunities.

  ### Snapshot / statistics dumps --------------------------------------------
  ### These feed run-report.sh and the self-healing pipeline.
  writeStatistics:               true
  exportCoveredTarget:           true

  ### Assertions in generated tests ------------------------------------------
  enableBasicAssertions:         true


### Authentication configurations.
### Two JWT-login entries (alice, bob) give EvoMaster's BOLA oracle the two
### distinct user tokens it needs to detect cross-user object access.
### The mechanic and admin entries unlock role-gated endpoints.
###
### NOTE: in white-box mode the driver's getInfoForAuthentication() is the
### primary auth source.  These entries act as a redundant fallback and are
### used when EvoMaster runs in black-box mode against the reverse proxy.

authTemplate:
  loginEndpointAuth:
    endpoint:    "/identity/api/auth/login"
    verb:        POST
    contentType: "application/json"
    token:
      extractFrom:   body
      extractSelector: "/token"
      sendIn:        header
      sendName:      "Authorization"
      sendTemplate:  "Bearer {}"
    expectCookies: false

auth:
  - name: alice
    loginEndpointAuth:
      payloadRaw: '{"email":"alice@evomaster.test","password":"Passw0rd!1A"}'

  - name: bob
    loginEndpointAuth:
      payloadRaw: '{"email":"bob@evomaster.test","password":"Passw0rd!1A"}'

  - name: mech
    loginEndpointAuth:
      payloadRaw: '{"email":"mech@evomaster.test","password":"Passw0rd!1A"}'

  - name: admin
    loginEndpointAuth:
      payloadRaw: '{"email":"admin@evomaster.test","password":"Passw0rd!1A"}'

  ### Static API-key entries (fixed headers — no login call needed).
  ### crAPI's JwtAuthTokenFilter accepts "Authorization: ApiKey <jwt>" and skips
  ### signature verification, so a fake-signed JWT works as a stable fixed header.
  ### These prevent the "Bearer {}" placeholder bug in generated test code.

  - name: alice-key
    fixedHeaders:
      - name:  "Authorization"
        value: "ApiKey eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhbGljZUBldm9tYXN0ZXIudGVzdCIsInJvbGUiOiJ1c2VyIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjQxMDI0NDQ4MDB9.AAAAAAAAAA"

  - name: bob-key
    fixedHeaders:
      - name:  "Authorization"
        value: "ApiKey eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJib2JAZXZvbWFzdGVyLnRlc3QiLCJyb2xlIjoidXNlciIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjo0MTAyNDQ0ODAwfQ.AAAAAAAAAA"

  - name: mech-key
    fixedHeaders:
      - name:  "Authorization"
        value: "ApiKey eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJtZWNoQGV2b21hc3Rlci50ZXN0Iiwicm9sZSI6Im1lY2hhbmljIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjQxMDI0NDQ4MDB9.AAAAAAAAAA"

  - name: admin-key
    fixedHeaders:
      - name:  "Authorization"
        value: "ApiKey eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbkBldm9tYXN0ZXIudGVzdCIsInJvbGUiOiJhZG1pbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjo0MTAyNDQ0ODAwfQ.AAAAAAAAAA"
