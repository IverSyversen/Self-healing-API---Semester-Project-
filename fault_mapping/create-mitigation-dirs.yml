name: Create mitigation directories from manifest

# Runs nightly at 02:00 UTC, plus a manual trigger for testing.
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-directories:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Default GITHUB_TOKEN is sufficient for committing to the same repo.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create missing directories from manifest
        id: create_dirs
        env:
          MANIFEST_PATH: manifests/repo_paths.json
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          manifest_path = os.environ["MANIFEST_PATH"]
          if not os.path.exists(manifest_path):
              print(f"No manifest at {manifest_path}, nothing to do.")
              sys.exit(0)

          with open(manifest_path) as f:
              manifest = json.load(f)

          entries = manifest.get("entries", [])
          if not entries:
              print("Manifest is empty, nothing to do.")
              sys.exit(0)

          created = []
          skipped = []

          for entry in entries:
              directory = entry.get("directory")
              if not directory:
                  print(f"Skipping entry without directory: {entry}")
                  continue

              gitkeep = os.path.join(directory, ".gitkeep")

              # Only create if the directory does not exist already, never
              # overwrite or modify directories that someone has populated.
              if os.path.isdir(directory):
                  skipped.append(directory)
                  continue

              os.makedirs(directory, exist_ok=True)
              with open(gitkeep, "w") as f:
                  # An empty file is fine, but a one-line note makes the
                  # placeholder self-documenting for anyone browsing the repo.
                  f.write("# Placeholder, replace with search_replace.json\n")
              created.append(directory)

          print(f"Created {len(created)} new directories:")
          for d in created:
              print(f"  + {d}")
          print(f"Skipped {len(skipped)} existing directories.")

          # Expose count for the next step to decide whether to commit.
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"created_count={len(created)}\n")
          PY

      - name: Commit and push new directories
        if: steps.create_dirs.outputs.created_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: scaffold mitigation directories from manifest

          Automated commit from the nightly directory-creation workflow.
          See manifests/repo_paths.json for the source manifest."
          git push

      - name: Report no-op
        if: steps.create_dirs.outputs.created_count == '0'
        run: echo "No new directories to create, manifest is in sync."
